version: '3.9'

services:
  # ─── Base de Datos ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: minimarket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: minimarket_db
      POSTGRES_USER: minimarket_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minimarket_user -d minimarket_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Sesiones / Blacklist) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: minimarket_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (Imágenes productos) ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minimarket_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Backend API (Node.js + TypeScript) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minimarket_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://minimarket_user:${DB_PASSWORD}@postgres:5432/minimarket_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: minimarket-assets
      MINIO_USE_SSL: 'false'
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      IA_SERVICE_URL: http://ia_service:8001
      BCRYPT_SALT_ROUNDS: 12
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Microservicio IA (Python + FastAPI) ───────────────────
  ia_service:
    build:
      context: ./ia_service
      dockerfile: Dockerfile
    container_name: minimarket_ia
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://minimarket_user:${DB_PASSWORD}@postgres:5432/minimarket_db
      MODEL_RETRAIN_CRON: "0 2 * * 1"
      FORECAST_HORIZONS: "7,14,30"
      BACKEND_URL: http://backend:3001
    ports:
      - "8001:8001"
    volumes:
      - ia_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx (Reverse Proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: minimarket_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - ia_service

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ia_models:
